<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Achievements 🎆</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-body: #fdf6f7;
            --bg-card: #ffffff;
            --text-main: #4a3b40;
            --text-sub: #64748b;
            --timer-bg: linear-gradient(135deg, #ffb3c1, #ffcad4);
            --timer-text: #ffffff;
            --border-color: #f7e1e5;
            --btn-accent: #ff758f;
            --btn-text: #ffffff;
            --task-bg: #fffbfc;
            --task-border: #fceef1;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --timer-bg: #0f172a;
            --timer-text: #38bdf8;
            --border-color: #334155;
            --btn-accent: #38bdf8;
            --btn-text: #0f172a;
            --task-bg: #0f172a;
            --task-border: #334155;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: var(--text-main); }
        
        .app-card { background-color: var(--bg-card); width: 95%; max-width: 400px; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border-color); position: relative; }
        
        /* Dark Mode Toggle Button */
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 20px; cursor: pointer; outline: none; }
        
        h1 { color: var(--text-main); font-size: 26px; margin: 10px 0 25px 0; font-weight: 700; }
        
        /* Stats Dashboard */
        .stats-badge { display: flex; justify-content: space-around; background: var(--task-bg); border: 1px solid var(--border-color); padding: 10px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .stat-item span { color: var(--btn-accent); font-size: 16px; }

        /* Timer Container */
        .timer-container { background: var(--timer-bg); border-radius: 20px; padding: 25px; color: var(--timer-text); margin-bottom: 25px; border: 1px solid var(--border-color); }
        #time-display { font-size: 45px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; }
        .timer-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .timer-inputs input { width: 70px; height: 42px; border: 1px solid var(--border-color); border-radius: 10px; text-align: center; font-size: 16px; outline: none; color: var(--text-main); font-weight: bold; background-color: var(--bg-card); }
        
        .timer-buttons { display: flex; justify-content: center; gap: 12px; }
        .timer-buttons button { background: #ffffff; border: none; color: #ff758f; font-size: 15px; font-weight: bold; cursor: pointer; padding: 10px 22px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        [data-theme="dark"] .timer-buttons button { background: #38bdf8; color: #0f172a; }
        #reset-btn { background: rgba(255, 255, 255, 0.4); color: white; box-shadow: none; }
        [data-theme="dark"] #reset-btn { background: #475569; color: white; }
        
        /* Tasks Section */
        .input-row { display: flex; gap: 10px; margin-bottom: 25px; }
        #task-input { flex: 1; height: 46px; border: 1px solid var(--border-color); border-radius: 12px; padding: 0 15px; font-size: 15px; outline: none; text-align: left; color: var(--text-main); background-color: var(--bg-card); }
        #task-input:focus { border-color: var(--btn-accent); }
        #add-task-btn { background-color: var(--btn-accent); color: var(--btn-text); border: none; border-radius: 12px; padding: 0 22px; font-size: 15px; cursor: pointer; font-weight: bold; }
        
        #tasks-list { text-align: left; }
        .task-box { display: flex; justify-content: space-between; align-items: center; background-color: var(--task-bg); padding: 14px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--task-border); border-left: 5px solid var(--btn-accent); }
        .task-text { font-size: 15px; color: var(--text-main); font-weight: 500; }
        .delete-btn { background-color: #ff5c5c; color: white; border: none; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: bold; }
        
        /* Motivation Message Area */
        #motivation-msg { color: #ff477e; font-weight: bold; margin-top: 20px; min-height: 24px; font-size: 18px; line-height: 1.4; text-align: center; direction: rtl; }
        [data-theme="dark"] #motivation-msg { color: #34d399; }
    </style>
</head>
<body>

    <div class="app-card">
        <button class="theme-toggle" id="theme-btn">💖</button>

        <h1>My Achievements 🎆</h1>

        <div class="stats-badge">
            <div class="stat-item">Tasks Done: <span id="streak-count">0</span></div>
            <div class="stat-item">Level: <span id="roka-level">Beginner</span></div>
        </div>

        <div class="timer-container">
            <div id="time-display">00:00:00</div>
            <div class="timer-inputs">
                <input type="number" id="hours-input" placeholder="Hrs" min="0" max="23">
                <input type="number" id="mins-input" placeholder="Min" min="0" max="59">
                <input type="number" id="secs-input" placeholder="Sec" min="0" max="59">
            </div>
            <div class="timer-buttons">
                <button id="start-btn">Start</button>
                <button id="reset-btn">Reset</button>
            </div>
        </div>

        <div class="input-row">
            <input type="text" id="task-input" placeholder="What is your goal today?">
            <button id="add-task-btn">Add</button>
        </div>

        <div id="tasks-list"></div>
        <div id="motivation-msg"></div>
    </div>

    <script>
        // الجمل التحفيزية العربية المبهجة والجميلة لروكا
        const completionMessages = [
            "عاش يا بطلة! الله على الإنجاز العظيم! 💪🔥",
            "تمت المهمة بنجاح! خطوة كمان وتقفلي كل أهدافك! 🚀✨",
            "بوم! هدف جديد اتحقق! فخور بيكي جداً يا روكا! 🌟",
            "شطورة ومتميزة كالعادة! كملي ومحدش هيقدر يوقفك! 🏆"
        ];

        const endTimerMessages = [
            "يا بطلة الوقت خلص! إنجاز أسطوري يضاف لتاريخك! 🏆🎉",
            "تمت المهمة بنجاح ساحق! أنتي شاطرة ومفيش زيك! 💪✨",
            "انتهى الوقت! خدي نفس عميق وافتخري بنفسك يا روكا! 🌟",
            "الله على العظمة! خلصنا الوقت بالتمام والكمال! 🚀🥳"
        ];

        let timer;
        const timeDisplay = document.getElementById('time-display');
        const hoursInput = document.getElementById('hours-input');
        const minsInput = document.getElementById('mins-input');
        const secsInput = document.getElementById('secs-input');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const motivationMsg = document.getElementById('motivation-msg');
        
        let streak = parseInt(localStorage.getItem('rokaStreak')) || 0;
        document.getElementById('streak-count').textContent = streak;
        updateLevel(streak);

        // Dark/Light Mode Engine
        const themeBtn = document.getElementById('theme-btn');
        let currentTheme = localStorage.getItem('rokaTheme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeBtn.textContent = currentTheme === 'light' ? '💖' : '🌙';

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            themeBtn.textContent = currentTheme === 'light' ? '💖' : '🌙';
            localStorage.setItem('rokaTheme', currentTheme);
        });

        // Safe Electronic Alarm sound generator
        function playAlarmSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        let osc = audioCtx.createOscillator();
                        let gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.2);
                    }, i * 300);
                }
            } catch(e) { console.log(e); }
        }

        startBtn.addEventListener('click', () => {
            clearInterval(timer);
            let hrs = parseInt(hoursInput.value) || 0;
            let mns = parseInt(minsInput.value) || 0;
            let scs = parseInt(secsInput.value) || 0;
            let totalSeconds = (hrs * 3600) + (mns * 60) + scs;
            
            if (totalSeconds <= 0) {
                alert("Please set a valid time first!");
                return;
            }
            
            timer = setInterval(() => {
                totalSeconds--;
                let h = Math.floor(totalSeconds / 3600);
                let m = Math.floor((totalSeconds % 3600) / 60);
                let s = totalSeconds % 60;
                
                timeDisplay.textContent = 
                    `${h < 10 ? '0' : ''}${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                
                if (totalSeconds <= 0) {
                    clearInterval(timer);
                    playAlarmSound();
                    confetti({ particleCount: 150, spread: 85, origin: { y: 0.5 } });
                    
                    const randomEndMsg = endTimerMessages[Math.floor(Math.random() * endTimerMessages.length)];
                    motivationMsg.textContent = randomEndMsg;
                    alert(randomEndMsg);
                }
            }, 1000);
        });

        resetBtn.addEventListener('click', () => { 
            clearInterval(timer); 
            timeDisplay.textContent = "00:00:00"; 
            hoursInput.value = ""; minsInput.value = ""; secsInput.value = "";
            motivationMsg.textContent = "";
        });

        // Tasks System
        const taskInput = document.getElementById('task-input');
        const addTaskBtn = document.getElementById('add-task-btn');
        const tasksList = document.getElementById('tasks-list');

        let savedTasks = JSON.parse(localStorage.getItem('myTasks')) || [];

        function renderTasks() {
            tasksList.innerHTML = "";
            savedTasks.forEach((task, index) => {
                const taskBox = document.createElement('div');
                taskBox.className = 'task-box';
                taskBox.innerHTML = `
                    <span class="task-text">${task}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">Done ✓</button>
                `;
                tasksList.appendChild(taskBox);
            });
        }

        addTaskBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text === "") return;
            savedTasks.push(text);
            localStorage.setItem('myTasks', JSON.stringify(savedTasks));
            renderTasks();
            taskInput.value = "";
            motivationMsg.textContent = "";
        });

        window.deleteTask = function(index) {
            savedTasks.splice(index, 1);
            localStorage.setItem('myTasks', JSON.stringify(savedTasks));
            renderTasks();
            
            // Increment Streak Dashboard
            streak++;
            localStorage.setItem('rokaStreak', streak);
            document.getElementById('streak-count').textContent = streak;
            updateLevel(streak);

            // Celebration Confetti
            confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
            
            // Show Arabic Motivation Message
            const randomMsg = completionMessages[Math.floor(Math.random() * completionMessages.length)];
            motivationMsg.textContent = randomMsg;
        };

        function updateLevel(score) {
            let lvl = "Beginner 👶";
            if (score >= 3) lvl = "Achiever ⭐";
            if (score >= 7) lvl = "Super Roka! 🏆";
            document.getElementById('roka-level').textContent = lvl;
        }

        renderTasks();
    </script>
</body>
</html>
