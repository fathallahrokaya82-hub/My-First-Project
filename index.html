<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجازاتي 🎆</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #fff5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 0.3s; }
        .app-card { background-color: #ffffff; width: 95%; max-width: 400px; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2); text-align: center; border: 1px solid #ffe3e3; }
        .header-actions { display: flex; justify-content: flex-start; margin-bottom: 15px; }
        #dark-mode-toggle { background-color: #ff769f; color: white; border: none; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; }
        h1 { color: #d63031; font-size: 26px; margin: 0 0 20px 0; }
        
        /* تصميم العداد البينك */
        .timer-container { background-color: #ff769f; border-radius: 20px; padding: 20px; color: white; margin-bottom: 25px; box-shadow: 0 8px 15px rgba(255, 118, 159, 0.3); }
        #time-display { font-size: 45px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; }
        .timer-inputs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .timer-inputs input { width: 65px; height: 40px; border: none; border-radius: 8px; text-align: center; font-size: 15px; outline: none; color: #333; font-weight: bold; background-color: #fff0f3; }
        .timer-buttons { display: flex; justify-content: center; gap: 15px; }
        .timer-buttons button { background: rgba(255,255,255,0.25); border: none; color: white; font-size: 15px; font-weight: bold; cursor: pointer; padding: 8px 20px; border-radius: 8px; transition: background 0.2s; }
        .timer-buttons button:hover { background: rgba(255,255,255,0.45); }
        
        /* إضافة الأهداف والمهام */
        .input-row { display: flex; gap: 12px; margin-bottom: 25px; }
        #task-input { flex: 1; height: 48px; border: 1px solid #ffccd5; border-radius: 12px; padding: 0 15px; font-size: 15px; outline: none; text-align: right; background-color: #fffcfc; }
        #task-input:focus { border-color: #ff769f; }
        #add-task-btn { background-color: #ff769f; color: white; border: none; border-radius: 12px; padding: 0 20px; font-size: 15px; cursor: pointer; font-weight: bold; }
        
        #tasks-list { text-align: right; }
        .task-box { display: flex; justify-content: space-between; align-items: center; background-color: #fff0f3; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 5px solid #ff769f; }
        .task-text { font-size: 16px; color: #2d3436; font-weight: 500; }
        .delete-btn { background-color: #ff4757; color: white; border: none; border-radius: 10px; padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: bold; }
        
        /* مكان الجمل التحفيزية */
        #motivation-msg { color: #e84393; font-weight: bold; margin-top: 15px; min-height: 24px; font-size: 18px; line-height: 1.4; }
        
        /* الدارك مود */
        body.dark-mode-active { background-color: #1a0f12; }
        body.dark-mode-active .app-card { background-color: #2d1b20; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: #44252e; }
        body.dark-mode-active h1 { color: #ff8fa3; }
        body.dark-mode-active #task-input { background-color: #3d252c; border-color: #5c3541; color: white; }
        body.dark-mode-active .task-box { background-color: #3d252c; border-right-color: #ff769f; }
        body.dark-mode-active .task-text { color: #fcc2cd; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header-actions">
            <button id="dark-mode-toggle">🌙 الوضع الداكن</button>
        </div>

        <h1>إنجازاتي 🎆</h1>

        <div class="timer-container">
            <div id="time-display">00:00:00</div>
            <div class="timer-inputs">
                <input type="number" id="hours-input" placeholder="ساعة" min="0" max="23">
                <input type="number" id="mins-input" placeholder="دقيقة" min="0" max="59">
                <input type="number" id="secs-input" placeholder="ثانية" min="0" max="59">
            </div>
            <div class="timer-buttons">
                <button id="start-btn">ابدأ العداد</button>
                <button id="reset-btn">إعادة تعيين</button>
            </div>
        </div>

        <div class="input-row">
            <input type="text" id="task-input" placeholder="ما هو هدفك اليوم؟">
            <button id="add-task-btn">إضافة</button>
        </div>

        <div id="tasks-list"></div>
        <div id="motivation-msg"></div>
    </div>

    <script>
        // الجمل التحفيزية
        const endTimerMessages = [
            "يا بطلة الوقت خلص! إنجاز أسطوري يضاف لتاريخك! 🏆🎉",
            "تمت المهمة بنجاح ساحق! أنتي شاطرة ومفيش زيك! 💪✨",
            "انتهى الوقت! خدي نفس عميق وافتخري بنفسك يا روكا! 🥮🌟",
            "الله على العظمة! خلصنا الوقت بالتمام والكمال! 🚀🥳"
        ];

        const messages = [
            "عاش يا بطلة! دايماً متميزة! 🌟",
            "خطوة ممتازة نحو النجاح! 🚀",
            "شطورة جداً، كملي كدة! 🎉",
            "فخور بيكي جداً! الكسل ملوش مكان هنا! 💪"
        ];

        let timer;
        const timeDisplay = document.getElementById('time-display');
        const hoursInput = document.getElementById('hours-input');
        const minsInput = document.getElementById('mins-input');
        const secsInput = document.getElementById('secs-input');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const motivationMsg = document.getElementById('motivation-msg');

        // صوت الجرس
        const bellAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/911/911-200.wav');

        startBtn.addEventListener('click', () => {
            clearInterval(timer);
            
            let hrs = parseInt(hoursInput.value) || 0;
            let mns = parseInt(minsInput.value) || 0;
            let scs = parseInt(secsInput.value) || 0;
            
            let totalSeconds = (hrs * 3600) + (mns * 60) + scs;
            
            if (totalSeconds <= 0) {
                alert("من فضلكِ حددي وقتاً صحيحاً أولاً!");
                return;
            }
            
            timer = setInterval(() => {
                totalSeconds--;
                
                let h = Math.floor(totalSeconds / 3600);
                let m = Math.floor((totalSeconds % 3600) / 60);
                let s = totalSeconds % 60;
                
                timeDisplay.textContent = 
                    `${h < 10 ? '0' : ''}${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                
                if (totalSeconds <= 0) {
                    clearInterval(timer);
                    
                    try {
                        bellAudio.play();
                    } catch(e) { console.log("Audio play delayed"); }
                    
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 } });
                    
                    const randomAlertMsg = endTimerMessages[Math.floor(Math.random() * endTimerMessages.length)];
                    motivationMsg.textContent = randomAlertMsg;
                    
                    alert(randomAlertMsg);
                }
            }, 1000);
        });

        resetBtn.addEventListener('click', () => { 
            clearInterval(timer); 
            timeDisplay.textContent = "00:00:00"; 
            hoursInput.value = "";
            minsInput.value = ""; 
            secsInput.value = "";
            motivationMsg.textContent = "";
            bellAudio.pause();
            bellAudio.currentTime = 0;
        });

        // إدارة المهام والحفظ
        const taskInput = document.getElementById('task-input');
        const addTaskBtn = document.getElementById('add-task-btn');
        const tasksList = document.getElementById('tasks-list');

        let savedTasks = [];
        try {
            savedTasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        } catch(e) { savedTasks = []; }

        function renderTasks() {
            tasksList.innerHTML = "";
            savedTasks.forEach((task, index) => {
                const taskBox = document.createElement('div');
                taskBox.className = 'task-box';
                taskBox.innerHTML = `
                    <span class="task-text">${task}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">تم الإنجاز ✓</button>
                `;
                tasksList.appendChild(taskBox);
            });
        }

        addTaskBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text === "") return;
            savedTasks.push(text);
            localStorage.setItem('myTasks', JSON.stringify(savedTasks));
            renderTasks();
            taskInput.value = "";
        });

        window.deleteTask = function(index) {
            savedTasks.splice(index, 1);
            localStorage.setItem('myTasks', JSON.stringify(savedTasks));
            renderTasks();
            
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            motivationMsg.textContent = randomMsg;
            setTimeout(() => { motivationMsg.textContent = ""; }, 5000);
        };

        // الدارك مود
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        try {
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode-active');
                darkModeToggle.textContent = "☀️ الوضع الفاتح";
            }
        } catch(e) {}

        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode-active');
            const isDark = document.body.classList.contains('dark-mode-active');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
            darkModeToggle.textContent = isDark ? "☀️ الوضع الفاتح" : "🌙 الوضع الداكن";
        });

        renderTasks();
    </script>
</body>
</html>
