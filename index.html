<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Achievements</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-card { background-color: #ffffff; width: 95%; max-width: 380px; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .header-actions { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        #dark-mode-toggle { background-color: #6c5ce7; color: white; border: none; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; }
        h1 { color: #2d3436; font-size: 26px; margin: 0 0 20px 0; text-align: center; }
        .timer-container { background-color: #6c5ce7; border-radius: 20px; padding: 20px; color: white; text-align: center; margin-bottom: 25px; }
        #time-display { font-size: 55px; font-weight: bold; margin-bottom: 15px; }
        .timer-row { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        #mins-input { width: 75px; height: 40px; border: none; border-radius: 8px; text-align: center; font-size: 15px; outline: none; color: #333; }
        .timer-buttons { display: flex; gap: 20px; }
        .timer-buttons button { background: none; border: none; color: white; font-size: 16px; font-weight: 500; cursor: pointer; }
        .input-row { display: flex; gap: 12px; margin-bottom: 25px; }
        #task-input { flex: 1; height: 48px; border: 1px solid #e0e0e0; border-radius: 12px; padding: 0 15px; font-size: 15px; outline: none; }
        #add-task-btn { background-color: #6c5ce7; color: white; border: none; border-radius: 12px; padding: 0 20px; font-size: 15px; cursor: pointer; }
        .task-box { display: flex; justify-content: space-between; align-items: center; background-color: #e3fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .task-text { font-size: 16px; color: #555555; text-decoration: underline; }
        .delete-btn { background-color: #ff7675; color: white; border: none; border-radius: 10px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
        body.dark-mode-active { background-color: #121212; }
        body.dark-mode-active .app-card { background-color: #1e1e1e; }
        body.dark-mode-active h1 { color: #ffffff; }
        body.dark-mode-active #task-input { background-color: #2d2d2d; border-color: #444; color: white; }
        body.dark-mode-active .task-box { background-color: #2d3748; }
        body.dark-mode-active .task-text { color: #e2e8f0; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header-actions">
            <button id="dark-mode-toggle">🌙 Dark Mode</button>
        </div>

        <h1>My Achievements 🎆</h1>

        <div class="timer-container">
            <div id="time-display">00:00</div>
            <div class="timer-row">
                <input type="number" id="mins-input" placeholder="Mins">
                <div class="timer-buttons">
                    <button id="start-btn">Start</button>
                    <button id="reset-btn">Reset</button>
                </div>
            </div>
        </div>

        <div class="input-row">
            <input type="text" id="task-input" placeholder="What's your goal today?">
            <button id="add-task-btn">Add Task</button>
        </div>

        <div id="tasks-list">
            <div class="task-box">
                <span class="task-text">أعمل سينابون أو دوناتس</span>
                <button class="delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <script>
        let timer;
        const timeDisplay = document.getElementById('time-display');
        const minsInput = document.getElementById('mins-input');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');

        startBtn.addEventListener('click', () => {
            clearInterval(timer);
            let minutes = parseInt(minsInput.value);
            if (isNaN(minutes) || minutes <= 0) return;
            let totalSeconds = minutes * 60;
            
            timer = setInterval(() => {
                totalSeconds--;
                let m = Math.floor(totalSeconds / 60);
                let s = totalSeconds % 60;
                timeDisplay.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                if (totalSeconds <= 0) { clearInterval(timer); alert("Time is up!"); }
            }, 1000);
        });

        resetBtn.addEventListener('click', () => { clearInterval(timer); timeDisplay.textContent = "00:00"; minsInput.value = ""; });

        const taskInput = document.getElementById('task-input');
        const addTaskBtn = document.getElementById('add-task-btn');
        const tasksList = document.getElementById('tasks-list');

        addTaskBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text === "") return;
            const taskBox = document.createElement('div');
            taskBox.className = 'task-box';
            taskBox.innerHTML = `<span class="task-text">${text}</span><button class="delete-btn">Delete</button>`;
            taskBox.querySelector('.delete-btn').addEventListener('click', () => { taskBox.remove(); });
            tasksList.appendChild(taskBox);
            taskInput.value = "";
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { e.target.parentElement.remove(); });
        });

        const darkModeToggle = document.getElementById('dark-mode-toggle');
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode-active');
            darkModeToggle.textContent = document.body.classList.contains('dark-mode-active') ? "☀️ Light Mode" : "🌙 Dark Mode";
        });
    </script>
</body>
</html>
