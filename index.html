<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #fff5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 0.3s; }
        .app-card { background-color: #ffffff; width: 95%; max-width: 400px; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2); text-align: center; border: 1px solid #ffe3e3; }
        .header-actions { display: flex; justify-content: flex-start; margin-bottom: 15px; }
        #dark-mode-toggle { background-color: #ff769f; color: white; border: none; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; }
        h1 { color: #d63031; font-size: 26px; margin: 0 0 20px 0; }
        
        /* تصميم العداد البينك الجديد */
        .timer-container { background-color: #ff769f; border-radius: 20px; padding: 20px; color: white; margin-bottom: 25px; box-shadow: 0 8px 15px rgba(255, 118, 159, 0.3); }
        #time-display { font-size: 45px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px; }
        .timer-inputs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .timer-inputs input { width: 65px; height: 40px; border: none; border-radius: 8px; text-align: center; font-size: 15px; outline: none; color: #333; font-weight: bold; background-color: #fff0f3; }
        .timer-buttons { display: flex; justify-content: center; gap: 15px; }
        .timer-buttons button { background: rgba(255,255,255,0.25); border: none; color: white; font-size: 15px; font-weight: bold; cursor: pointer; padding: 8px 20px; border-radius: 8px; transition: background 0.2s; }
        .timer-buttons button:hover { background: rgba(255,255,255,0.45); }
        
        /* إضافة الأهداف والمهام */
        .input-row { display: flex; gap: 12px; margin-bottom: 25px; }
        #task-input { flex: 1; height: 48px; border: 1px solid #ffccd5; border-radius: 12px; padding: 0 15px; font-size: 15px; outline: none; text-align: right; background-color: #fffcfc; }
        #task-input:focus { border-color: #ff769f; }
        #add-task-btn { background-color: #ff769f; color: white; border: none; border-radius: 12px; padding: 0 20px; font-size: 15px; cursor: pointer; font-weight: bold; }
        
        #tasks-list { text-align: right; }
        .task-box { display: flex; justify-content: space-between; align-items: center; background-color: #fff0f3; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 5px solid #ff769f; }
        .task-text { font-size: 16px; color: #2d3436; font-weight: 500; }
