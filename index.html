<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجازاتي 🎆</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 0.3s; }
        .app-card { background-color: #ffffff; width: 95%; max-width: 380px; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .header-actions { display: flex; justify-content: flex-start; margin-bottom: 15px; }
        #dark-mode-toggle { background-color: #6c5ce7; color: white; border: none; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; }
        h1 { color: #2d3436; font-size: 26px; margin: 0 0 20px 0; }
        .timer-container { background-color: #6c5ce7; border-radius: 20px; padding: 20px; color: white; margin-bottom: 25px; }
        #time-display { font-size: 55px; font-weight: bold; margin-bottom: 15px; }
        .timer-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        #mins-input { width: 80px; height: 40px; border: none; border-radius: 8px; text-align: center; font-size: 16px; outline: none; color: #333; }
        .timer-buttons { display: flex; gap: 15px; }
        .timer-buttons button { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 15px; font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 8px; }
        .timer-buttons button:hover { background: rgba(255,255,255,0.4); }
        .input-row { display: flex; gap: 12px; margin-bottom: 25px; }
        #task-input { flex: 1; height: 48px; border: 1px solid #e0e0e0; border-radius: 12px; padding: 0 15px; font-size: 15px; outline: none; text-align: right; }
        #add-task-btn { background-color: #6c5ce7; color: white; border: none; border-radius: 12px; padding: 0 20px; font-size: 15px; cursor: pointer; font-weight: bold; }
        #tasks-list { text-align: right; }
        .task-box { display: flex; justify-content: space-between; align-items: center; background-color: #e3fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; animation: fadeIn 0.3s ease; }
        .task-text { font-size: 16px; color: #2d3436; font-weight: 500; }
        .delete-btn { background-color: #ff7675; color: white; border: none; border-radius: 10px; padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: bold; }
        #motivation-msg { color: #2ed573; font-weight: bold; margin-top: 15px; min-height: 24px; font-size: 16px; }
        
        /* الدارك مود */
        body.dark-mode-active { background-color: #121212; }
        body.dark-mode-active .app-card { background-color: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        body.dark-mode-active h1 { color: #ffffff; }
        body.dark-mode-active #task-input { background-color: #2d2d2d; border-color: #444; color: white; }
        body.dark-mode-active .task-box { background-color: #2d3748; }
        body.dark-mode-active .task-text { color: #e2e8f0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header-actions">
            <button id="dark-mode-toggle">🌙 الوضع الداكن</button>
        </div>

        <h1>إنجازاتي 🎆</h1>

        <div class="timer-container">
            <div id="time-display">00:00</div>
            <div class="timer-row">
                <input type="number" id="mins-input" placeholder="الدقائق" min="1">
                <div class="timer-buttons">
                    <button id="start-btn">ابدأ</button>
                    <button id="reset-btn">إعادة تعيين</button>
                </div>
            </div>
        </div>

        <div class="input-row">
            <input type="text" id="task-input" placeholder="ما هو هدفك اليوم؟">
            <button id="add-task-btn">إضافة</button>
        </div>

        <div id="tasks-list"></div>
        <div id="motivation-msg"></div>
    </div>

    <script>
        // مصفوفة الرسايل التحفيزية
        const messages = [
            "عاش يا بطلة! دايماً متميزة! 🌟",
            "خطوة ممتازة نحو النجاح! 🚀",
            "شطورة جداً، كملي كدة! 🎉",
            "إنجاز رائع! السينابون مستني القفلة! 🥮",
            "فخور بيكي جداً! الكسل ملوش مكان هنا! 💪"
        ];

        let timer;
        const timeDisplay = document.getElementById('time-display');
        const minsInput = document.getElementById('mins-input');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const motivationMsg = document.getElementById('motivation-msg');

        // تشغيل التايمر
        startBtn.addEventListener('click', () => {
            clearInterval(timer);
            let minutes = parseInt(minsInput.value);
            if (isNaN(minutes) || minutes <= 0) {
                alert("من فضلك ادخلي عدد دقائق صحيح!");
                return;
            }
            let totalSeconds = minutes * 60;
            
            timer = setInterval(() => {
                totalSeconds--;
                let m = Math.floor(totalSeconds / 60);
                let s = totalSeconds % 60;
                timeDisplay.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                
                if (totalSeconds <= 0) {
                    clearInterval(timer);
                    confetti(); // تأثير الورق الطاير
                    motivationMsg.textContent = "الوقت خلص! إنجاز عظيم! ⏰🎉";
                    alert("عاش! الوقت انتهى بنجاح!");
                }
            }, 1000);
        });

        // ريست التايمر
        resetBtn.addEventListener('click', () => { 
            clearInterval(timer); 
            timeDisplay.textContent = "00:00"; 
            minsInput.value = ""; 
            motivationMsg.textContent = "";
        });

        // إدارة المهام والحفظ التلقائي
        const taskInput = document.getElementById('task-input');
        const addTaskBtn = document.getElementById('add-task-btn');
        const tasksList = document.getElementById('tasks-list');

        let savedTasks = JSON.parse(localStorage.getItem('myTasks')) || [];

        function renderTasks() {
            tasksList.innerHTML = "";
            savedTasks.forEach((task, index) => {
                const taskBox = document.createElement('div');
                taskBox.className = 'task-box';
                taskBox.innerHTML = `
                    <span class="task-text">${task}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">تم الإنجاز ✓</button>
                `;
                tasksList.appendChild(taskBox);
            });
        }

        addTaskBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text === "") return;
            savedTasks.push(text);
            localStorage.setItem('myTasks', JSON.stringify(savedTasks));
            renderTasks();
            taskInput.value = "";
        });

        window.deleteTask = function(index) {
            savedTasks.splice(index, 1);
            localStorage.setItem('myTasks', JSON.stringify(savedTasks));
            renderTasks();
            
            // تشغيل الورق الطاير والرسالة التحفيزية عند مسح المهمة
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            motivationMsg.textContent = randomMsg;
            setTimeout(() => { motivationMsg.textContent = ""; }, 4000);
        };

        // الدارك مود مع الحفظ
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode-active');
            darkModeToggle.textContent = "☀️ الوضع الفاتح";
        }

        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode-active');
            const isDark = document.body.classList.contains('dark-mode-active');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
            darkModeToggle.textContent = isDark ? "☀️ الوضع الفاتح" : "🌙 الوضع الداكن";
        });

        // تحميل الداتا أول ما الصفحة تفتح
        renderTasks();
    </script>
</body>
</html>
